# Build and publish Spyx to PyPI when a GitHub release is published.
#
# Auth uses the existing PYPI_API_TOKEN repository secret. To move to PyPI
# Trusted Publishing (OIDC, no stored token) later, configure a publisher at
# https://pypi.org/manage/project/spyx/settings/publishing/ then drop the
# `with:` block and add `permissions: id-token: write` to this job.

name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build sdist + wheel
        run: uv build
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
