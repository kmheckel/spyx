# Lint + test CI for Spyx.
# Runs on every push to main and every pull request targeting main.
# The project uses uv for dependency management and ruff for linting (see
# pyproject.toml / AGENTS.md), so this workflow is a thin wrapper around those.

name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # pyproject.toml pins requires-python = ">=3.11, <3.13" because flax 0.11+
        # dropped 3.10. Keep the matrix aligned with the supported range.
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project with loaders + quant extras
        # `uv sync --all-extras` pulls in qwix (from GitHub via tool.uv.sources)
        # and tonic so the quant and loader tests actually run.
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check

      - name: Pytest
        # The tonic-gated loader tests hit an external dataset endpoint and
        # will be flaky on CI; skip them here via -k and rely on the rest of
        # the 50+ test suite. Run locally with `uv run pytest` to include them.
        run: uv run pytest -v -k "not test_loaders_grain"
