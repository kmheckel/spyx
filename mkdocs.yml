site_name: Spyx
site_description: "Spyx: SNNs in JAX"
site_url: https://github.com/kmheckel/spyx

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
  - mkdocstrings:
      handlers:
        python:
          paths: [.]

nav:
  - Home: index.md
  - Tutorials:
      - Your first SNN: tutorials/first-snn.md
      - Surrogate Gradient Tutorial: examples/surrogate_gradient/SurrogateGradientTutorial.ipynb
      - Cartpole Evolution: examples/neuroevolution/cartpole_evo.ipynb
      - Neuron Model Comparison: examples/surrogate_gradient/shd_sg_neuron_model_comparison.ipynb
      - Surrogate Comparison: examples/surrogate_gradient/shd_sg_surrogate_comparison.ipynb
      - SHD Template: examples/surrogate_gradient/shd_sg_template.ipynb
      - NIR Conversion: examples/nir/conversion.ipynb
      - NIR Braille RSNN: examples/nir/rsnn/braille_spyx.ipynb
      - NIR N-MNIST SCNN: examples/nir/scnn/nmnist_spyx.ipynb
      - NIR Single Neuron LIF: examples/nir/single_neuron/lif_spyx.ipynb
      - Quantization-Aware Training: examples/quantization/qat_intro.ipynb
      - State-Space Models: examples/ssm/ssm_intro.ipynb
      - Phasor Networks: examples/phasor/phasor_intro.ipynb
  - How-to guides:
      - Quickstart: how-to/quickstart.md
      - Install Spyx: how-to/install.md
      - Train a model: how-to/train.md
      - Quantize a model: how-to/quantize.md
      - Export & import via NIR: how-to/nir.md
      - Export to ONNX: how-to/onnx.md
      - Use SSM & phasor layers: how-to/recurrent-layers.md
      - Benchmark neurons & models: how-to/benchmarking.md
      - Deploy a trained SNN: how-to/deploy.md
      - Load event data: how-to/load-data.md
      - Migrate from Haiku to NNX: how-to/migrate-haiku-to-nnx.md
  - Reference:
      - spyx.nn: reference/nn.md
      - spyx.axn: reference/axn.md
      - spyx.fn: reference/fn.md
      - spyx.data: reference/data.md
      - spyx.optimize: reference/optimize.md
      - spyx.nir: reference/nir.md
      - spyx.quant: reference/quant.md
      - spyx.ssm: reference/ssm.md
      - spyx.phasor: reference/phasor.md
      - spyx.bench: reference/bench.md
      - spyx.experimental: reference/experimental.md
      - spyx.experimental.onnx: reference/onnx.md
  - Explanation:
      - Training methods: explanation/training-methods.md
      - Choosing an approach: explanation/choosing-an-approach.md
      - Surrogate gradients & Gaussian smoothing: explanation/surrogate-gradients-and-gaussian-smoothing.md
      - Design & architecture: explanation/design.md
      - SNN primer: explanation/snn-primer.md
      - Parallel spiking neurons: explanation/parallel-spiking-neurons.md
      - Research with Spyx: explanation/research.md
      - Glossary: explanation/glossary.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - footnotes
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - md_in_html
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
